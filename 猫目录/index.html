<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世界猫图鉴 | 首页</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero__inner">
      <p class="kicker">Cat Atlas</p>
      <h1>了解世界各地区的猫品种和习性</h1>
      <p class="subtitle">从北美到中东，按地区探索具有代表性的猫。</p>
    </div>
  </header>

  <main class="container">
    <section>
      <h2>选择地区</h2>
      <div class="region-grid">
        <a class="region-card" href="region.html?area=north-america">
          <h3>北美</h3>
          <p>缅因猫、美国短毛猫等。</p>
        </a>
        <a class="region-card" href="region.html?area=south-america">
          <h3>南美</h3>
          <p>本地家猫与自然适应型猫群。</p>
        </a>
        <a class="region-card" href="region.html?area=asia">
          <h3>亚洲</h3>
          <p>暹罗猫、日本短尾猫、狸花猫等。</p>
        </a>
        <a class="region-card" href="region.html?area=middle-east">
          <h3>中东</h3>
          <p>波斯猫、安哥拉猫与沙漠适应性。</p>
        </a>
        <a class="region-card" href="region.html?area=africa">
          <h3>非洲</h3>
          <p>阿比西尼亚猫等古老血统。</p>
        </a>
        <a class="region-card" href="region.html?area=other">
          <h3>其他</h3>
          <p>欧洲与大洋洲代表品种。</p>
        </a>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>世界猫图鉴 · 按地区探索</p>
  </footer>
</body>
</html>
