<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世界猫图鉴 | 首页</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero__inner">
      <p class="kicker">CATALOG</p>
      <h1 class="hero-title">了解世界各地区的猫品种和习性</h1>
    </div>
  </header>

  <main class="container">
    <section>
      <p class="section-intro">点击世界地图上的大洲，查看该地区代表猫品种。</p>
      <h2>世界地图入口</h2>

      <div class="map-panel">
        <div class="world-map-wrap">
          <img
            class="world-map-photo"
            src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg"
            alt="按大洲划分的世界地图，点击可进入对应地区猫品种页面"
            loading="lazy"
            referrerpolicy="no-referrer"
          />

          <a href="region.html?area=north-america" class="map-hotspot hotspot-na" aria-label="进入北美洲">
            <span>北美洲</span>
          </a>
          <a href="region.html?area=south-america" class="map-hotspot hotspot-sa" aria-label="进入南美洲">
            <span>南美洲</span>
          </a>
          <a href="region.html?area=europe" class="map-hotspot hotspot-eu" aria-label="进入欧洲">
            <span>欧洲</span>
          </a>
          <a href="region.html?area=africa" class="map-hotspot hotspot-af" aria-label="进入非洲">
            <span>非洲</span>
          </a>
          <a href="region.html?area=asia" class="map-hotspot hotspot-asia" aria-label="进入亚洲">
            <span>亚洲</span>
          </a>
          <a href="region.html?area=oceania" class="map-hotspot hotspot-oc" aria-label="进入大洋洲">
            <span>大洋洲</span>
          </a>
        </div>
      </div>

      <div class="continent-links">
        <a href="region.html?area=asia">亚洲</a>
        <a href="region.html?area=europe">欧洲</a>
        <a href="region.html?area=south-america">南美洲</a>
        <a href="region.html?area=north-america">北美洲</a>
        <a href="region.html?area=africa">非洲</a>
        <a href="region.html?area=oceania">大洋洲</a>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>世界猫图鉴 · 按地区探索</p>
  </footer>
</body>
</html>
